# Codex CLI project configuration for Castparty
# See: https://developers.openai.com/codex/config-basic

# Use the Codex-optimized model for the main session.
model = "gpt-5-codex"

# Match Claude Code's "ask before potentially risky work" posture.
approval_policy = "on-request"

# Allow writes within the workspace; keep command network access disabled.
sandbox_mode = "workspace-write"
web_search = "live"

# Our AGENTS.md is larger than the default instruction budget.
project_doc_max_bytes = 65536

# Fall back to Claude's repo guide if AGENTS.md is missing in a nested context.
project_doc_fallback_filenames = ["CLAUDE.md"]

# Keep the main agent direct, but allow high-effort reasoning for multi-step work.
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
personality = "pragmatic"

[features]
codex_hooks = true
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[sandbox_workspace_write]
network_access = false
